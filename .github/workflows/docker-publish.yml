name: Publish HA app images

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DESCRIBE=$(git describe --tags --long --abbrev=4 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          if [ -z "$DESCRIBE" ]; then
            DESCRIBE=$(git describe --tags --long --abbrev=4 --match "[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          fi

          if [[ "$DESCRIBE" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([0-9a-f]{4,})$ ]]; then
            TAG_BASE="${BASH_REMATCH[1]}"
            COMMITS_AHEAD="${BASH_REMATCH[2]}"
            SHA4="${BASH_REMATCH[3]:0:4}"
            if [ "$COMMITS_AHEAD" -eq 0 ]; then
              RELEASE_VERSION="$TAG_BASE"
            else
              RELEASE_VERSION="${TAG_BASE}+${COMMITS_AHEAD}-${SHA4}"
            fi
          else
            SHA4=$(git rev-parse --short=4 HEAD)
            RELEASE_VERSION="${BASE_VERSION}+0-${SHA4}"
          fi

          IMAGE_REPO="ghcr.io/jubr/ha-app-whatsapper-${{ matrix.arch }}"

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "full_tag=${IMAGE_REPO}:${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.version.outputs.full_tag }}
          build-args: |
            APP_BUILD_VERSION=${{ steps.version.outputs.release_version }}
            WWEBJS_REF=${{ vars.WWEBJS_REF }}
