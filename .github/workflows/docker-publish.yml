name: Publish HA app images

on:
  push:
    branches:
      - main
      - cursor/**
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DESCRIBE=$(git describe --tags --long --abbrev=4 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          if [ -z "$DESCRIBE" ]; then
            DESCRIBE=$(git describe --tags --long --abbrev=4 --match "[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          fi

          if [[ "$DESCRIBE" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([0-9a-f]{4,})$ ]]; then
            TAG_BASE="${BASH_REMATCH[1]}"
            COMMITS_AHEAD="${BASH_REMATCH[2]}"
            SHA4="${BASH_REMATCH[3]:0:4}"
            if [ "$COMMITS_AHEAD" -eq 0 ]; then
              RELEASE_VERSION="$TAG_BASE"
              IS_DIRTY_BUILD=0
            else
              RELEASE_VERSION="${TAG_BASE}-${COMMITS_AHEAD}-${SHA4}"
              IS_DIRTY_BUILD=1
            fi
          else
            SHA4=$(git rev-parse --short=4 HEAD)
            RELEASE_VERSION="${BASE_VERSION}-0-${SHA4}"
            IS_DIRTY_BUILD=1
          fi

          if [ "$IS_DIRTY_BUILD" -eq 1 ]; then
            APP_RUNTIME_NAME="whatsappur"
            APP_RUNTIME_PORT="3001"
            IMAGE_REPO="ghcr.io/jubr/ha-app-whatsappur-${{ matrix.arch }}"
          else
            APP_RUNTIME_NAME="whatsapper"
            APP_RUNTIME_PORT="3000"
            IMAGE_REPO="ghcr.io/jubr/ha-app-whatsapper-${{ matrix.arch }}"
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "full_tag=${IMAGE_REPO}:${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_runtime_name=$APP_RUNTIME_NAME" >> "$GITHUB_OUTPUT"
          echo "app_runtime_port=$APP_RUNTIME_PORT" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.version.outputs.full_tag }}
          build-args: |
            APP_BUILD_VERSION=${{ steps.version.outputs.release_version }}
            APP_RUNTIME_NAME=${{ steps.version.outputs.app_runtime_name }}
            APP_PORT=${{ steps.version.outputs.app_runtime_port }}
            WWEBJS_REF=${{ vars.WWEBJS_REF }}

  update-main-config-for-dirty:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DESCRIBE=$(git describe --tags --long --abbrev=4 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          if [ -z "$DESCRIBE" ]; then
            DESCRIBE=$(git describe --tags --long --abbrev=4 --match "[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          fi

          if [[ "$DESCRIBE" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([0-9a-f]{4,})$ ]]; then
            TAG_BASE="${BASH_REMATCH[1]}"
            COMMITS_AHEAD="${BASH_REMATCH[2]}"
            SHA4="${BASH_REMATCH[3]:0:4}"
            if [ "$COMMITS_AHEAD" -eq 0 ]; then
              RELEASE_VERSION="$TAG_BASE"
              IS_DIRTY_BUILD=0
            else
              RELEASE_VERSION="${TAG_BASE}-${COMMITS_AHEAD}-${SHA4}"
              IS_DIRTY_BUILD=1
            fi
          else
            SHA4=$(git rev-parse --short=4 HEAD)
            RELEASE_VERSION="${BASE_VERSION}-0-${SHA4}"
            IS_DIRTY_BUILD=1
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_dirty_build=$IS_DIRTY_BUILD" >> "$GITHUB_OUTPUT"

      - name: Write dirty config.yaml to main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') && steps.version.outputs.is_dirty_build == '1'
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main-sync origin/main

          cat > config.yaml <<YAML
          name: "Whatsappur"
          slug: "whatsappur"
          description: "Expose whatsapp-web.js via HTTP and websocket API with Home Assistant integration files bundled."
          version: "${RELEASE_VERSION}"
          startup: services
          boot: auto
          init: false
          arch:
            - amd64
            - aarch64
          image: "ghcr.io/jubr/ha-app-whatsappur-{arch}"
          url: "https://github.com/jubr/whatsapper/blob/main/docs/homeassistant-integration.md"
          ingress: true
          ingress_port: 3001
          ingress_entry: /
          ingress_stream: true
          panel_icon: mdi:whatsapp
          panel_title: Whatsappur
          ports:
            3001/tcp: null
          ports_description:
            3001/tcp: Whatsappur HTTP + WebSocket API (enable port mapping if you need direct LAN access)
          map:
            - type: homeassistant_config
              read_only: false
          environment:
            HA_CUSTOM_COMPONENTS_PATH: /config/custom_components
            APP_BUILD_VERSION: "${RELEASE_VERSION}"
            APP_RUNTIME_NAME: whatsappur
            APP_PORT: "3001"
          YAML

          git add config.yaml
          if git diff --cached --quiet; then
            echo "config.yaml already up to date on main"
            exit 0
          fi

          git commit -m "Update whatsappur config.yaml to ${RELEASE_VERSION} [skip ci]"
          git push origin HEAD:main
