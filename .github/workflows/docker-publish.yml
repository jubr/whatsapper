name: Publish HA app images

on:
  push:
    branches:
      - main
      - cursor/**
      - more-wa
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DESCRIBE=$(git describe --tags --long --abbrev=4 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          if [ -z "$DESCRIBE" ]; then
            DESCRIBE=$(git describe --tags --long --abbrev=4 --match "[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          fi

          if [[ "$DESCRIBE" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([0-9a-f]{4,})$ ]]; then
            TAG_BASE="${BASH_REMATCH[1]}"
            COMMITS_AHEAD="${BASH_REMATCH[2]}"
            SHA4="${BASH_REMATCH[3]:0:4}"
            if [ "$COMMITS_AHEAD" -eq 0 ]; then
              RELEASE_VERSION="$TAG_BASE"
              IS_DIRTY_BUILD=0
            else
              RELEASE_VERSION="${TAG_BASE}-${COMMITS_AHEAD}-${SHA4}"
              IS_DIRTY_BUILD=1
            fi
          else
            SHA4=$(git rev-parse --short=4 HEAD)
            RELEASE_VERSION="${BASE_VERSION}-0-${SHA4}"
            IS_DIRTY_BUILD=1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            IS_TAG_REF=1
          else
            IS_TAG_REF=0
          fi

          if [ "$IS_TAG_REF" -eq 1 ]; then
            BUILD_STABLE=1
            BUILD_DEV=1
          elif [ "$IS_DIRTY_BUILD" -eq 1 ]; then
            BUILD_STABLE=0
            BUILD_DEV=1
          else
            BUILD_STABLE=1
            BUILD_DEV=0
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_dirty_build=$IS_DIRTY_BUILD" >> "$GITHUB_OUTPUT"
          echo "is_tag_ref=$IS_TAG_REF" >> "$GITHUB_OUTPUT"
          echo "build_stable=$BUILD_STABLE" >> "$GITHUB_OUTPUT"
          echo "build_dev=$BUILD_DEV" >> "$GITHUB_OUTPUT"
          echo "stable_tag=ghcr.io/jubr/ha-app-whatsapper-${{ matrix.arch }}:${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "dev_tag=ghcr.io/jubr/ha-app-whatsappur-${{ matrix.arch }}:${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync integration version before build
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re

          release_version = os.environ["RELEASE_VERSION"].strip()
          if not release_version:
              raise SystemExit("RELEASE_VERSION is empty")

          manifest_path = pathlib.Path("homeassistant/custom_components/whatsapper/manifest.json")
          init_py_path = pathlib.Path("homeassistant/custom_components/whatsapper/__init__.py")

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["version"] = release_version
          manifest_path.write_text(json.dumps(manifest, indent=4) + "\n", encoding="utf-8")

          init_py = init_py_path.read_text(encoding="utf-8")
          init_py_updated, replacements = re.subn(
              r'INTEGRATION_RUNTIME_VERSION\s*=\s*["\'][^"\']+["\']',
              f'INTEGRATION_RUNTIME_VERSION = "{release_version}"',
              init_py,
              count=1,
          )
          if replacements != 1:
              raise SystemExit("Could not update INTEGRATION_RUNTIME_VERSION in __init__.py")
          init_py_path.write_text(init_py_updated, encoding="utf-8")

          print(f"Synced integration version to {release_version}")
          PY

      - name: Build and push stable image
        if: steps.version.outputs.build_stable == '1'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.version.outputs.stable_tag }}
          build-args: |
            APP_BUILD_VERSION=${{ steps.version.outputs.release_version }}
            APP_RUNTIME_NAME=whatsapper
            APP_PORT=3000
            WWEBJS_REF=${{ vars.WWEBJS_REF }}

      - name: Build and push dev image
        if: steps.version.outputs.build_dev == '1'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.version.outputs.dev_tag }}
          build-args: |
            APP_BUILD_VERSION=${{ steps.version.outputs.release_version }}
            APP_RUNTIME_NAME=whatsappur
            APP_PORT=3001
            WWEBJS_REF=${{ vars.WWEBJS_REF }}

  update-main-addon-config:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DESCRIBE=$(git describe --tags --long --abbrev=4 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          if [ -z "$DESCRIBE" ]; then
            DESCRIBE=$(git describe --tags --long --abbrev=4 --match "[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          fi

          if [[ "$DESCRIBE" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([0-9a-f]{4,})$ ]]; then
            TAG_BASE="${BASH_REMATCH[1]}"
            COMMITS_AHEAD="${BASH_REMATCH[2]}"
            SHA4="${BASH_REMATCH[3]:0:4}"
            if [ "$COMMITS_AHEAD" -eq 0 ]; then
              RELEASE_VERSION="$TAG_BASE"
              IS_DIRTY_BUILD=0
            else
              RELEASE_VERSION="${TAG_BASE}-${COMMITS_AHEAD}-${SHA4}"
              IS_DIRTY_BUILD=1
            fi
          else
            SHA4=$(git rev-parse --short=4 HEAD)
            RELEASE_VERSION="${BASE_VERSION}-0-${SHA4}"
            IS_DIRTY_BUILD=1
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_dirty_build=$IS_DIRTY_BUILD" >> "$GITHUB_OUTPUT"

      - name: Write addon config file to main
        if: github.event_name == 'push'
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          IS_DIRTY_BUILD="${{ steps.version.outputs.is_dirty_build }}"
          IS_TAG_REF=0
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            IS_TAG_REF=1
          fi
          if [ "$IS_TAG_REF" = "1" ]; then
            BUILD_STABLE=1
            BUILD_DEV=1
          elif [ "$IS_DIRTY_BUILD" = "1" ]; then
            BUILD_STABLE=0
            BUILD_DEV=1
          else
            BUILD_STABLE=1
            BUILD_DEV=0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main-sync origin/main

          update_debug_config() {
            TARGET_FILE="debug/whatsappur/config.yaml"
            mkdir -p debug/whatsappur
            [ -f "${TARGET_FILE}" ] || { echo "Missing target file: ${TARGET_FILE}" >&2; exit 1; }
            sed -E -i \
              -e "s|^version:[[:space:]]*\".*\"$|version: \"${RELEASE_VERSION}\"|" \
              -e "s|^image:[[:space:]]*\".*\"$|image: \"ghcr.io/jubr/ha-app-whatsappur-{arch}\"|" \
              -e "s|^([[:space:]]*APP_BUILD_VERSION:[[:space:]]*\").*(\")$|\\1${RELEASE_VERSION}\\2|" \
              "${TARGET_FILE}"
          }

          update_regular_config() {
            TARGET_FILE="config.yaml"
            [ -f "${TARGET_FILE}" ] || { echo "Missing target file: ${TARGET_FILE}" >&2; exit 1; }
            sed -E -i \
              -e "s|^version:[[:space:]]*\".*\"$|version: \"${RELEASE_VERSION}\"|" \
              -e "s|^image:[[:space:]]*\".*\"$|image: \"ghcr.io/jubr/ha-app-whatsapper-{arch}\"|" \
              "${TARGET_FILE}"
          }

          if [ "$BUILD_STABLE" = "1" ]; then
            update_regular_config
          fi
          if [ "$BUILD_DEV" = "1" ]; then
            update_debug_config
          fi

          git add config.yaml debug/whatsappur/config.yaml
          if git diff --cached --quiet; then
            echo "Addon config files already up to date on main"
            exit 0
          fi

          if [ "$BUILD_STABLE" = "1" ] && [ "$BUILD_DEV" = "1" ]; then
            COMMIT_SCOPE="config.yaml + debug/whatsappur/config.yaml"
          elif [ "$BUILD_DEV" = "1" ]; then
            COMMIT_SCOPE="debug/whatsappur/config.yaml"
          else
            COMMIT_SCOPE="config.yaml"
          fi

          git commit -m "Update ${COMMIT_SCOPE} to ${RELEASE_VERSION} [skip ci]"
          git push origin HEAD:main
