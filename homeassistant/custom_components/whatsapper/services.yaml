notify:
  name: "Whatsapper notify service"
  description: "Send a notification using Whatsapper"
  fields:
    message:
      name: Send message
      description: The message to send
      example: "Hello World"
    target:
      name: Chat target
      description: "Optional chat_id (e.g. 12345@g.us) or chat/channel name to resolve."
      example: "Family Group"
    data:
      name: Extra options
      description: >
        Optional dictionary for advanced send options. Set
        `reply_to_message_id` to quote-reply to a specific WhatsApp message id.
      example:
        reply_to_message_id: "true_12345@c.us_ABCDEF"
