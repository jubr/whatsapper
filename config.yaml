name: "Whatsapper"
slug: "whatsapper"
description: "Expose whatsapp-web.js via HTTP and websocket API with Home Assistant integration files bundled."
version: "1.1.0"
startup: services
boot: auto
init: false
arch:
  - amd64
url: "https://github.com/jubr/whatsapper/blob/main/docs/homeassistant-integration.md"
ingress: true
ingress_port: 3000
ingress_entry: /
ingress_stream: true
panel_icon: mdi:whatsapp
panel_title: Whatsapper
ports:
  3000/tcp: null
ports_description:
  3000/tcp: Whatsapper HTTP + WebSocket API (enable port mapping if you need direct LAN access)
map:
  - type: homeassistant_config
    read_only: false
environment:
  HA_CUSTOM_COMPONENTS_PATH: /config/custom_components
