name: "Whatsappur"
slug: "whatsappur"
description: "Expose whatsapp-web.js via HTTP and websocket API with Home Assistant integration files bundled."
version: "2.0.0-0-f17a"
startup: services
boot: auto
init: false
arch:
  - amd64
  - aarch64
image: "ghcr.io/jubr/ha-app-whatsappur-{arch}"
url: "https://github.com/jubr/whatsapper/blob/main/docs/homeassistant-integration.md"
ingress: true
ingress_port: 3001
ingress_entry: ''
ingress_stream: true
panel_icon: mdi:whatsapp
panel_title: Whatsappur
ports:
  3001/tcp: null
ports_description:
  3001/tcp: Whatsappur HTTP + WebSocket API (enable port mapping if you need direct LAN access)
map:
  - type: homeassistant_config
    read_only: false
environment:
  HA_CUSTOM_COMPONENTS_PATH: /homeassistant/custom_components
  APP_BUILD_VERSION: "2.0.0-0-f17a"
  APP_RUNTIME_NAME: whatsappur
  APP_PORT: "3001"
