# Home Assistant automation blueprint:
# Whatsapper/Whatsappur chat auto-translate with reactions.
#
# Prerequisite (create once in your HA config):
# rest_command:
#   whatsapper_google_translate:
#     url: >-
#       https://translate.googleapis.com/translate_a/single?client=gtx&ie=UTF-8&oe=UTF-8&sl={{ sl | default('auto') }}&tl={{ tl | default('en') }}&dt=t&dt=ld&q={{ text | urlencode }}
#     method: GET
#     timeout: 20
#     headers:
#       User-Agent: >-
#         Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36
#       Accept: application/json,text/plain,*/*
#       Accept-Language: en-US,en;q=0.9
blueprint:
  name: Whatsapper chat translate (language pair)
  description: >-
    Translates messages in a single WhatsApp chat, posts the translation as a
    regular message, and updates reactions for busy/success/fail.
    Input `wa_service_name` drives both notify service and incoming event type:
    `notify.<name>` + `<name>_message`.
  domain: automation
  input:
    chat_name:
      name: Chat name
      description: Exact `chat_name` from incoming WhatsApp events.
      default: Home Assistant
      selector:
        text: {}
    wa_service_name:
      name: WhatsApp service name
      description: >-
        Service/event name suffix (e.g. `whatsappur` -> `notify.whatsappur`
        + `whatsappur_message`).
      default: whatsappur
      selector:
        text: {}
    reaction_busy:
      name: Busy reaction icon
      default: "🐟"
      selector:
        text: {}
    reaction_fail:
      name: Fail reaction icon
      default: "❓"
      selector:
        text: {}
    confidence_level:
      name: Language confidence threshold
      description: Minimum language-detection confidence before translating.
      default: 0.5
      selector:
        number:
          min: 0
          max: 1
          step: 0.05
          mode: slider
    language_one:
      name: Language group one
      description: Comma-separated 2-letter language codes.
      default: "nl,en"
      selector:
        text: {}
    language_two:
      name: Language group two
      description: Comma-separated 2-letter language codes.
      default: "pt"
      selector:
        text: {}

mode: queued
max: 10

trigger_variables:
  input_wa_service_name: !input wa_service_name
  input_chat_name: !input chat_name
  input_event_type: "{{ input_wa_service_name ~ '_message' }}"

variables:
  cfg_chat_name: !input chat_name
  cfg_wa_service_name: !input wa_service_name
  cfg_reaction_busy: !input reaction_busy
  cfg_reaction_fail: !input reaction_fail
  cfg_confidence_level: !input confidence_level
  cfg_language_one: !input language_one
  cfg_language_two: !input language_two
  cfg_lang_to_flag:
    en: "🇬🇧"
    nl: "🇳🇱"
    pt: "🇵🇹"
    de: "🇩🇪"
    fr: "🇫🇷"
    es: "🇪🇸"
    it: "🇮🇹"
    tr: "🇹🇷"
    pl: "🇵🇱"
    ro: "🇷🇴"
    sv: "🇸🇪"
    no: "🇳🇴"
  selected_notify_service: "{{ 'notify.' ~ cfg_wa_service_name }}"
  lang_one_codes: >-
    {{ cfg_language_one | default('nl,en') | lower | regex_findall('[a-z]{2}') }}
  lang_two_codes: >-
    {{ cfg_language_two | default('pt') | lower | regex_findall('[a-z]{2}') }}
  lang_one_primary: "{{ lang_one_codes | first | default('nl') }}"
  lang_two_primary: "{{ lang_two_codes | first | default('pt') }}"
  ignore_prefix_regex: >-
    {% set flags = [
      cfg_lang_to_flag.get(lang_two_primary, '🌐'),
      cfg_lang_to_flag.get(lang_one_primary, '🌐'),
      '🌐'
    ] %}
    ^({{ flags | unique | join('|') }})
  source_text: "{{ trigger.event.data.body | default('') | trim }}"
  source_chat_name: "{{ trigger.event.data.chat_name | default('') | trim }}"
  source_chat_id: "{{ trigger.event.data.chat_id | default('') | trim }}"
  source_message_id: "{{ trigger.event.data.message_id | default('') | trim }}"
  source_alpha_char_count: "{{ source_text | regex_replace('[^A-Za-zÀ-ÖØ-öø-ÿ]', '') | length }}"
  translation_success: false
  detected_source_lang: ""
  source_lang_reaction: "{{ cfg_reaction_fail }}"

trigger:
  - platform: event
    event_type: "{{ input_event_type }}"
    event_data:
      chat_name: "{{ input_chat_name }}"

condition:
  - condition: template
    value_template: >-
      {{
        source_chat_name == cfg_chat_name
        and source_chat_id != ''
        and source_message_id != ''
        and source_text != ''
        and not (source_text is match(ignore_prefix_regex))
      }}

action:
  - service: "{{ selected_notify_service }}"
    data:
      target:
        - "{{ source_chat_id }}"
      message: ""
      data:
        reply_to_message_id: "{{ source_message_id }}"
        reaction_add: "{{ cfg_reaction_busy }}"

  - service: rest_command.whatsapper_google_translate
    continue_on_error: true
    data:
      text: "{{ source_text }}"
      sl: auto
      tl: en
    response_variable: detect_source_response

  - variables:
      detect_source_status: >-
        {{ ((detect_source_response | default({})).status | default(0)) | int(0) }}
      source_lang: >-
        {% set payload = (detect_source_response | default({})).content | default([]) %}
        {% set lang = '' %}
        {% if payload is sequence and (payload | count) > 2 and payload[2] is string %}
          {% set lang = payload[2] | lower %}
        {% elif payload is sequence
            and (payload | count) > 8
            and payload[8] is sequence
            and (payload[8] | count) > 0
            and payload[8][0] is sequence
            and (payload[8][0] | count) > 0 %}
          {% set lang = payload[8][0][0] | lower %}
        {% endif %}
        {{ lang | trim }}
      source_lang_base: >-
        {% set normalized = (source_lang | default('') | lower | replace('_', '-')) %}
        {{ normalized.split('-')[0] if normalized else '' }}
      source_conf: >-
        {% set payload = (detect_source_response | default({})).content | default([]) %}
        {% set conf = 0 %}
        {% if payload is sequence and (payload | count) > 6 %}
          {% set conf = payload[6] | float(0) %}
        {% elif payload is sequence
            and (payload | count) > 8
            and payload[8] is sequence
            and (payload[8] | count) > 2
            and payload[8][2] is sequence
            and (payload[8][2] | count) > 0 %}
          {% set conf = payload[8][2][0] | float(0) %}
        {% endif %}
        {{ conf }}
      expected_target_lang: >-
        {{
          lang_two_primary if source_lang_base in lang_one_codes else
          lang_one_primary if source_lang_base in lang_two_codes else
          ''
        }}
      translated_flag: "{{ cfg_lang_to_flag.get(expected_target_lang, '🌐') }}"
      detected_source_lang: "{{ source_lang_base }}"
      source_lang_reaction: "{{ cfg_lang_to_flag.get(source_lang_base, cfg_reaction_fail) }}"
      source_gate_ok: >-
        {{
          detect_source_status == 200
          and source_lang_base in ((lang_one_codes + lang_two_codes) | unique | list)
          and expected_target_lang != ''
          and (
            source_conf | float(0) >= (cfg_confidence_level | float(0.5))
            or source_alpha_char_count | int(0) >= 5
          )
        }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ source_gate_ok }}"
        sequence:
          - service: rest_command.whatsapper_google_translate
            continue_on_error: true
            data:
              text: "{{ source_text }}"
              sl: "{{ source_lang }}"
              tl: "{{ expected_target_lang }}"
            response_variable: translate_response

          - variables:
              translate_status: >-
                {{ ((translate_response | default({})).status | default(0)) | int(0) }}
              translated_text: >-
                {% if ((translate_response | default({})).status | default(0) | int(0)) == 200 %}
                  {% set content = (translate_response | default({})).content | default([]) %}
                  {% set first = content[0] if content is sequence and (content | count) > 0 else [] %}
                  {{ (first | default([]) | map(attribute=0) | join('')) | trim }}
                {% else %}
                  {{ '' }}
                {% endif %}
              translate_gate_ok: >-
                {{
                  translate_status == 200
                  and translated_text != ''
                  and translated_text | lower != source_text | lower
                }}

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ translate_gate_ok }}"
                sequence:
                  - service: rest_command.whatsapper_google_translate
                    continue_on_error: true
                    data:
                      text: "{{ translated_text }}"
                      sl: auto
                      tl: en
                    response_variable: detect_translated_response

                  - variables:
                      detect_translated_status: >-
                        {{ ((detect_translated_response | default({})).status | default(0)) | int(0) }}
                      translated_lang: >-
                        {% set payload = (detect_translated_response | default({})).content | default([]) %}
                        {% set lang = '' %}
                        {% if payload is sequence and (payload | count) > 2 and payload[2] is string %}
                          {% set lang = payload[2] | lower %}
                        {% elif payload is sequence
                            and (payload | count) > 8
                            and payload[8] is sequence
                            and (payload[8] | count) > 0
                            and payload[8][0] is sequence
                            and (payload[8][0] | count) > 0 %}
                          {% set lang = payload[8][0][0] | lower %}
                        {% endif %}
                        {{ lang | trim }}
                      translated_lang_base: >-
                        {% set normalized = (translated_lang | default('') | lower | replace('_', '-')) %}
                        {{ normalized.split('-')[0] if normalized else '' }}
                      target_gate_ok: >-
                        {{
                          detect_translated_status == 200
                          and translated_lang_base == expected_target_lang
                        }}

                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ target_gate_ok }}"
                        sequence:
                          - service: "{{ selected_notify_service }}"
                            data:
                              target:
                                - "{{ source_chat_id }}"
                              message: "{{ translated_flag }} {{ translated_text }}"
                          - variables:
                              translation_success: true

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ translation_success | bool }}"
        sequence:
          - service: "{{ selected_notify_service }}"
            data:
              target:
                - "{{ source_chat_id }}"
              message: ""
              data:
                reply_to_message_id: "{{ source_message_id }}"
                reaction_add: "{{ source_lang_reaction }}"
    default:
      - service: "{{ selected_notify_service }}"
        data:
          target:
            - "{{ source_chat_id }}"
          message: ""
          data:
            reply_to_message_id: "{{ source_message_id }}"
            reaction_add: "{{ cfg_reaction_fail }}"
