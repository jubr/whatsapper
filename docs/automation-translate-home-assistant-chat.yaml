# Home Assistant package: Whatsapper NL<->PT auto-translate helper
#
# Place in /config/packages/ (or split parts into your own config).
# This listens on the hardcoded chat_name "Home Assistant".
# It translates both inbound and self-sent messages.
# Loop prevention is done by ignoring messages that already start with
# one of the translator flags (🇵🇹 / 🇳🇱 / 🌐).
#
# Detection + gating logic:
# - Detect source language and confidence from Google translate response.
# - Only process when source language is nl or pt.
# - nl -> pt (🇵🇹), pt -> nl (🇳🇱), everything else skipped.
# - "Good enough" gate:
#   src in {nl, pt}
#   and (confidence >= 0.85 or >= 5 alphabetic chars)
#   and translated output re-detects as expected target language.
# - If gate fails, no message is sent.
#
# Stable service/event names:
# - event_type: whatsapper_message
# - notify service: notify.whatsapper
#
# Dirty builds:
# - event_type: whatsappur_message
# - notify service: notify.whatsappur

rest_command:
  whatsapper_detect_language:
    url: >-
      https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&dt=ld&q={{ text | urlencode }}
    method: GET
    timeout: 15

  whatsapper_translate_nl_to_pt:
    url: >-
      https://translate.googleapis.com/translate_a/single?client=gtx&sl=nl&tl=pt&dt=t&q={{ text | urlencode }}
    method: GET
    timeout: 15

  whatsapper_translate_pt_to_nl:
    url: >-
      https://translate.googleapis.com/translate_a/single?client=gtx&sl=pt&tl=nl&dt=t&q={{ text | urlencode }}
    method: GET
    timeout: 15

automation:
  - id: whatsapper_home_assistant_chat_translate
    alias: Whatsapper Home Assistant chat NL<->PT translate
    mode: queued
    max: 10
    variables:
      # Hardcoded mode switch:
      # false => stable (whatsapper_message + notify.whatsapper)
      # true  => dirty  (whatsappur_message + notify.whatsappur)
      use_dirty_build: false
      selected_event_type: >-
        {{ 'whatsappur_message' if use_dirty_build else 'whatsapper_message' }}
      source_text: "{{ trigger.event.data.body | default('') | trim }}"
      source_chat_id: "{{ trigger.event.data.chat_id | default('') }}"
      source_message_id: "{{ trigger.event.data.message_id | default('') }}"
      source_alpha_char_count: "{{ source_text | regex_replace('[^A-Za-zÀ-ÖØ-öø-ÿ]', '') | length }}"
    trigger:
      - platform: event
        event_type: whatsapper_message
      - platform: event
        event_type: whatsappur_message
    condition:
      - condition: template
        value_template: >-
          {{
            trigger.event.event_type == selected_event_type
            and trigger.event.data.chat_name == 'Home Assistant'
            and source_chat_id != ''
            and source_message_id != ''
            and source_text != ''
            and not (source_text is match('^(🇵🇹|🇳🇱|🌐)'))
          }}
    action:
      - action: rest_command.whatsapper_detect_language
        data:
          text: "{{ source_text }}"
        response_variable: detect_source_response

      - variables:
          source_lang: >-
            {% set payload = detect_source_response.content | default([]) %}
            {% set lang = '' %}
            {% if payload is sequence and (payload | count) > 2 and payload[2] is string %}
              {% set lang = payload[2] | lower %}
            {% elif payload is sequence
                and (payload | count) > 8
                and payload[8] is sequence
                and (payload[8] | count) > 0
                and payload[8][0] is sequence
                and (payload[8][0] | count) > 0 %}
              {% set lang = payload[8][0][0] | lower %}
            {% endif %}
            {{ lang }}
          source_conf: >-
            {% set payload = detect_source_response.content | default([]) %}
            {% set conf = 0 %}
            {% if payload is sequence and (payload | count) > 6 %}
              {% set conf = payload[6] | float(0) %}
            {% elif payload is sequence
                and (payload | count) > 8
                and payload[8] is sequence
                and (payload[8] | count) > 2
                and payload[8][2] is sequence
                and (payload[8][2] | count) > 0 %}
              {% set conf = payload[8][2][0] | float(0) %}
            {% endif %}
            {{ conf }}
          expected_target_lang: >-
            {% if source_lang == 'nl' %}
              pt
            {% elif source_lang == 'pt' %}
              nl
            {% else %}
              {{ '' }}
            {% endif %}
          translated_flag: >-
            {% if source_lang == 'nl' %}
              🇵🇹
            {% elif source_lang == 'pt' %}
              🇳🇱
            {% else %}
              🌐
            {% endif %}

      - condition: template
        value_template: >-
          {{
            expected_target_lang != ''
            and (source_conf | float(0) >= 0.85 or source_alpha_char_count | int(0) >= 5)
          }}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ source_lang == 'nl' }}"
            sequence:
              - action: rest_command.whatsapper_translate_nl_to_pt
                data:
                  text: "{{ source_text }}"
                response_variable: translate_response
          - conditions:
              - condition: template
                value_template: "{{ source_lang == 'pt' }}"
            sequence:
              - action: rest_command.whatsapper_translate_pt_to_nl
                data:
                  text: "{{ source_text }}"
                response_variable: translate_response

      - variables:
          translated_text: >-
            {{
              (
                translate_response.content[0]
                | default([])
                | map(attribute=0)
                | join('')
              ) | trim
            }}

      - condition: template
        value_template: "{{ translated_text != '' and translated_text | lower != source_text | lower }}"

      - action: rest_command.whatsapper_detect_language
        data:
          text: "{{ translated_text }}"
        response_variable: detect_translated_response

      - variables:
          translated_lang: >-
            {% set payload = detect_translated_response.content | default([]) %}
            {% set lang = '' %}
            {% if payload is sequence and (payload | count) > 2 and payload[2] is string %}
              {% set lang = payload[2] | lower %}
            {% elif payload is sequence
                and (payload | count) > 8
                and payload[8] is sequence
                and (payload[8] | count) > 0
                and payload[8][0] is sequence
                and (payload[8][0] | count) > 0 %}
              {% set lang = payload[8][0][0] | lower %}
            {% endif %}
            {{ lang }}

      - condition: template
        value_template: "{{ translated_lang == expected_target_lang }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ use_dirty_build }}"
            sequence:
              - action: notify.whatsappur
                data:
                  target:
                    - "{{ source_chat_id }}"
                  message: "{{ translated_flag }} {{ translated_text }}"
                  data:
                    reply_to_message_id: "{{ source_message_id }}"
        default:
          - action: notify.whatsapper
            data:
              target:
                - "{{ source_chat_id }}"
              message: "{{ translated_flag }} {{ translated_text }}"
              data:
                reply_to_message_id: "{{ source_message_id }}"
