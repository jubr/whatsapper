# YAML doc 1/2 (configuration.yaml or package):
# Single reusable rest_command for detect+translate.
rest_command:
  whatsapper_google_translate:
    url: >-
      https://translate.googleapis.com/translate_a/single?client=gtx&sl={{ sl | default('auto') }}&tl={{ tl | default('en') }}&dt=t&dt=ld&q={{ text | urlencode }}
    method: GET
    timeout: 15

---

# YAML doc 2/2 (scripts.yaml or package):
# No automation trigger included on purpose.
# Call this script from your own automation:
# action: script.whatsapper_translate_home_assistant_chat
# data:
#   source_text: "{{ trigger.event.data.body }}"
#   source_chat_name: "{{ trigger.event.data.chat_name }}"
#   source_chat_id: "{{ trigger.event.data.chat_id }}"
#   source_message_id: "{{ trigger.event.data.message_id }}"
#   use_dirty_build: false
whatsapper_translate_home_assistant_chat:
  alias: Whatsapper Home Assistant chat NL<->PT translate
  mode: queued
  max: 10
  fields:
    source_text:
      description: Original message text
      example: "Hallo, tudo bem?"
      required: true
      selector:
        text:
          multiline: true
    source_chat_name:
      description: Chat name (must be exactly Home Assistant)
      example: Home Assistant
      required: true
      selector:
        text:
    source_chat_id:
      description: WhatsApp chat id (target for reply)
      example: "1234567890@c.us"
      required: true
      selector:
        text:
    source_message_id:
      description: Original WhatsApp message id (for quote reply)
      example: "true_12345@c.us_ABCDEF"
      required: true
      selector:
        text:
    use_dirty_build:
      description: false => notify.whatsapper, true => notify.whatsappur
      default: false
      selector:
        boolean:
  sequence:
    - variables:
        source_text_trim: "{{ source_text | default('') | trim }}"
        source_chat_name_trim: "{{ source_chat_name | default('') | trim }}"
        source_chat_id_trim: "{{ source_chat_id | default('') | trim }}"
        source_message_id_trim: "{{ source_message_id | default('') | trim }}"
        source_alpha_char_count: >-
          {{ source_text_trim | regex_replace('[^A-Za-zÀ-ÖØ-öø-ÿ]', '') | length }}

    - condition: template
      value_template: >-
        {{
          source_chat_name_trim == 'Home Assistant'
          and source_chat_id_trim != ''
          and source_message_id_trim != ''
          and source_text_trim != ''
          and not (source_text_trim is match('^(🇵🇹|🇳🇱|🌐)'))
        }}

    - action: rest_command.whatsapper_google_translate
      data:
        text: "{{ source_text_trim }}"
        sl: auto
        tl: en
      response_variable: detect_source_response

    - variables:
        source_lang: >-
          {% set payload = detect_source_response.content | default([]) %}
          {% set lang = '' %}
          {% if payload is sequence and (payload | count) > 2 and payload[2] is string %}
            {% set lang = payload[2] | lower %}
          {% elif payload is sequence
              and (payload | count) > 8
              and payload[8] is sequence
              and (payload[8] | count) > 0
              and payload[8][0] is sequence
              and (payload[8][0] | count) > 0 %}
            {% set lang = payload[8][0][0] | lower %}
          {% endif %}
          {{ lang | trim }}
        source_conf: >-
          {% set payload = detect_source_response.content | default([]) %}
          {% set conf = 0 %}
          {% if payload is sequence and (payload | count) > 6 %}
            {% set conf = payload[6] | float(0) %}
          {% elif payload is sequence
              and (payload | count) > 8
              and payload[8] is sequence
              and (payload[8] | count) > 2
              and payload[8][2] is sequence
              and (payload[8][2] | count) > 0 %}
            {% set conf = payload[8][2][0] | float(0) %}
          {% endif %}
          {{ conf }}
        expected_target_lang: >-
          {{ 'pt' if source_lang == 'nl' else 'nl' if source_lang == 'pt' else '' }}
        translated_flag: >-
          {{ '🇵🇹' if source_lang == 'nl' else '🇳🇱' if source_lang == 'pt' else '🌐' }}

    - condition: template
      value_template: >-
        {{
          expected_target_lang != ''
          and (
            source_conf | float(0) >= 0.85
            or source_alpha_char_count | int(0) >= 5
          )
        }}

    - action: rest_command.whatsapper_google_translate
      data:
        text: "{{ source_text_trim }}"
        sl: "{{ source_lang }}"
        tl: "{{ expected_target_lang }}"
      response_variable: translate_response

    - variables:
        translated_text: >-
          {{
            (
              translate_response.content[0]
              | default([])
              | map(attribute=0)
              | join('')
            ) | trim
          }}

    - condition: template
      value_template: >-
        {{
          translated_text != ''
          and translated_text | lower != source_text_trim | lower
        }}

    - action: rest_command.whatsapper_google_translate
      data:
        text: "{{ translated_text }}"
        sl: auto
        tl: en
      response_variable: detect_translated_response

    - variables:
        translated_lang: >-
          {% set payload = detect_translated_response.content | default([]) %}
          {% set lang = '' %}
          {% if payload is sequence and (payload | count) > 2 and payload[2] is string %}
            {% set lang = payload[2] | lower %}
          {% elif payload is sequence
              and (payload | count) > 8
              and payload[8] is sequence
              and (payload[8] | count) > 0
              and payload[8][0] is sequence
              and (payload[8][0] | count) > 0 %}
            {% set lang = payload[8][0][0] | lower %}
          {% endif %}
          {{ lang | trim }}

    - condition: template
      value_template: "{{ translated_lang == expected_target_lang }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ use_dirty_build | bool }}"
          sequence:
            - action: notify.whatsappur
              data:
                target:
                  - "{{ source_chat_id_trim }}"
                message: "{{ translated_flag }} {{ translated_text }}"
                data:
                  reply_to_message_id: "{{ source_message_id_trim }}"
      default:
        - action: notify.whatsapper
          data:
            target:
              - "{{ source_chat_id_trim }}"
            message: "{{ translated_flag }} {{ translated_text }}"
            data:
              reply_to_message_id: "{{ source_message_id_trim }}"
